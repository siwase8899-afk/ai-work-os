name: Update stock dashboard data

on:
  workflow_dispatch:
  schedule:
    - cron: "30 7 * * 1-5"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Generate stock dashboard data
        run: python scripts/generate_stock_data.py
      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update stock dashboard data"
          file_pattern: data/stock-data.json
